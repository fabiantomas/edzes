<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Edzés">
<title>Edzés Napló</title>
<style>
:root {
  --bg: #0d0d10;
  --surface: #18181f;
  --card: #1e1e28;
  --border: #2a2a36;
  --accent: #b8ff57;
  --accent-dim: rgba(184,255,87,.12);
  --blue: #55aaff;
  --blue-dim: rgba(85,170,255,.12);
  --text: #f0f0f2;
  --muted: #777;
  --danger: #ff5555;
  --r: 16px;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  display:flex;
  flex-direction:column;
}

/* ── TOPBAR (sticky, minimal) ── */
.topbar{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:calc(var(--st) + 12px) 14px 10px;
  background:rgba(13,13,16,.92);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  z-index:60;
}
.topbar-title{
  flex:1;font-size:18px;font-weight:800;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;user-select:none;
  display:flex;align-items:center;gap:6px;
}
.topbar-title .chev{
  color:var(--muted);flex-shrink:0;
  transition:transform .2s;display:block;
}
.topbar-title.open .chev{transform:rotate(180deg);}

/* ── FŐMENÜ (export/import) ── */
.main-menu{
  position:fixed;top:calc(var(--st) + 58px);right:12px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:6px;
  display:none;flex-direction:column;gap:2px;
  z-index:120;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
  min-width:220px;
}
.main-menu.open{display:flex;}
.mm-item{
  display:flex;align-items:center;gap:10px;
  background:transparent;border:none;
  color:var(--text);font-family:inherit;font-size:14px;font-weight:500;
  padding:11px 12px;border-radius:9px;
  cursor:pointer;text-align:left;width:100%;
}
.mm-item:active{background:var(--card);}
.mm-item svg{color:var(--muted);flex-shrink:0;}

/* ── DAY DROPDOWN ── */
.day-menu{
  flex-shrink:0;
  max-height:0;overflow:hidden;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  transition:max-height .26s cubic-bezier(.4,0,.2,1);
}
.day-menu.open{max-height:140px;border-bottom:1px solid var(--border);}

/* ── HEADER (görgethető nap-név sor) ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 6px;
  gap:10px;
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.week-pill{
  background:var(--accent);color:#0d0d10;
  font-size:13px;font-weight:700;
  padding:5px 13px;border-radius:20px;
  cursor:pointer;user-select:none;flex-shrink:0;
}
.day-name{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.01em;}
.hdr-right{display:flex;gap:7px;flex-shrink:0;}
.icon-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:8px;
  color:var(--muted);
  cursor:pointer;user-select:none;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.icon-btn svg{display:block;}
.icon-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

/* ── DAY SELECTOR ── */
.day-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
  padding:12px 14px;
  background:var(--surface);
}
.day-btn{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:10px;padding:8px 2px;
  text-align:center;cursor:pointer;user-select:none;
  transition:all .18s;
}
.day-btn span{display:block;}
.day-btn .dl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
.day-btn .ds{font-size:9px;color:var(--muted);opacity:.7;margin-top:1px;}
.day-btn.active{background:var(--accent);border-color:var(--accent);}
.day-btn.active .dl,.day-btn.active .ds{color:#0d0d10;}

/* ── PROGRESS ── */
.prog-wrap{flex-shrink:0;height:3px;background:var(--border);}
.prog-fill{height:100%;background:var(--accent);transition:width .3s;}

/* ── MAIN CONTENT AREA ── */
.pages{flex:1;overflow:hidden;position:relative;}

/* ── WORKOUT PAGE: egyetlen vertikális scroll-konténer ── */
.workout-page{
  position:absolute;inset:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* Görgethető fejléc-blokk (nap-név + napválasztó) */
.scroll-head{ background:var(--bg); }

/* Exercise nav strip — sticky a tetejen */
.ex-nav{
  position:sticky;top:0;z-index:30;
  display:flex;gap:6px;
  padding:10px 14px 8px;
  background:rgba(13,13,16,.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.ex-nav::-webkit-scrollbar{display:none;}
.ex-pill{
  flex-shrink:0;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:20px;padding:5px 13px;
  font-size:12px;font-weight:600;color:var(--muted);
  cursor:pointer;user-select:none;transition:all .15s;
  display:flex;align-items:center;gap:5px;
}
.ex-pill.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.ex-pill.done-pill{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.ex-pill .pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* Kártya tartó */
.swipe-area{ position:relative; }
.swipe-track{ display:block; }
.ex-slide{
  display:flex;flex-direction:column;
  padding:12px 14px calc(var(--sb) + 82px);
  gap:10px;
}

/* TESTSÚLY KÁRTYA */
.bw-card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.bw-label{font-size:15px;font-weight:600;color:var(--text);}
.bw-input-wrap{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:10px;padding:6px 12px;
}
.bw-input-wrap:focus-within{border-color:var(--accent);}
.bw-input{
  width:70px;background:transparent;border:none;outline:none;
  font-size:20px;font-weight:700;color:var(--text);text-align:right;
  appearance:none;-webkit-appearance:none;
}
.bw-unit{font-size:13px;color:var(--muted);font-weight:600;}

/* TESTSÚLY FÜL (teljes kártya) */
.bw-card-full{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:28px 20px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.bw-full-label{font-size:17px;font-weight:700;color:var(--text);}
.bw-input-wrap-lg{padding:12px 18px;}
.bw-input-lg{width:120px;font-size:30px;text-align:center;}
.bw-hint{font-size:12px;color:var(--muted);text-align:center;}
.bw-pill svg{display:block;}

/* KOMMENT MEZŐ */
.note-wrap{margin-top:14px;}
.note-input{
  width:100%;background:var(--surface);
  border:1.5px solid var(--border);border-radius:10px;
  padding:10px 12px;color:var(--text);
  font-family:inherit;font-size:14px;line-height:1.4;
  outline:none;resize:none;
  -webkit-appearance:none;appearance:none;
}
.note-input::placeholder{color:var(--muted);}
.note-input:focus{border-color:var(--accent);}

/* FOCUS CARD */
.focus-card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:20px 18px;
}
.focus-card.is-active-ex{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent);
}
.fc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.fc-name{font-size:20px;font-weight:700;line-height:1.2;}
.fc-name-input{
  flex:1;width:100%;
  background:var(--surface);border:1.5px solid var(--accent);
  border-radius:10px;padding:8px 10px;
  font-size:18px;font-weight:700;color:var(--text);
  outline:none;
}
.dl-input,.ds-input{
  width:100%;background:var(--bg);
  border:1px solid var(--accent);border-radius:6px;
  text-align:center;color:var(--text);outline:none;
  font-family:inherit;
}
.dl-input{font-size:11px;font-weight:700;padding:3px 2px;}
.ds-input{font-size:9px;padding:2px;margin-top:2px;}
.fc-badge{
  font-size:11px;font-weight:700;color:var(--muted);
  background:var(--surface);padding:3px 9px;border-radius:12px;
  flex-shrink:0;margin-left:8px;margin-top:2px;
}

/* SET ROW */
.sets-list{display:flex;flex-direction:column;gap:10px;}
.set-row{
  display:grid;
  grid-template-columns:28px 1fr 1fr;
  gap:8px;align-items:center;
}
.set-num{font-size:12px;color:var(--muted);font-weight:700;text-align:center;}

/* DRAG CONTROL */
.drag-ctrl{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:12px;
  display:flex;flex-direction:column;
  align-items:center;
  padding:8px 6px 6px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
  position:relative;
  cursor:ns-resize;
  transition:border-color .15s,background .15s;
}
.drag-ctrl.filled{
  border-color:var(--blue);
  background:var(--blue-dim);
}
.drag-ctrl.dragging{
  border-color:var(--accent);
  background:var(--accent-dim);
}
.dc-val{
  font-size:22px;font-weight:700;
  color:var(--text);line-height:1;
  min-height:28px;
  display:flex;align-items:center;
  pointer-events:none;
}
.dc-val.is-prev{color:var(--muted);font-size:18px;font-weight:400;}
.dc-unit{font-size:10px;color:var(--muted);margin-top:3px;pointer-events:none;}
.dc-arrows{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:0;opacity:.3;
  pointer-events:none;color:var(--muted);
}
.dc-arrows svg{display:block;margin:-1px 0;}

/* Tap-to-edit overlay */
.dc-input-wrap{
  position:absolute;inset:0;opacity:0;
  pointer-events:none;
}
.dc-input-wrap.editing{
  opacity:1;pointer-events:auto;
  background:var(--bg);border-radius:11px;
}
.dc-input-wrap input{
  width:100%;height:100%;
  background:transparent;border:none;outline:none;
  font-size:22px;font-weight:700;
  text-align:center;color:var(--text);
  caret-color:var(--accent);
  appearance:none;-webkit-appearance:none;
}

/* PREV ROW */
.prev-row{
  display:flex;gap:8px;margin-top:4px;
}
.prev-chip{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:6px 8px;
  display:flex;justify-content:space-between;align-items:center;
}
.prev-label{font-size:10px;color:var(--muted);}
.prev-val{font-size:13px;font-weight:600;color:var(--muted);}

/* NEXT/PREV EXERCISE BUTTONS */
.ex-nav-btns{
  flex-shrink:0;
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 14px calc(var(--sb) + 10px);
  background:rgba(13,13,16,.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;gap:8px;
  z-index:40;
}
.btn-prev-ex{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:14px 18px;
  color:var(--muted);
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.btn-next-ex{
  flex:1;background:var(--accent);color:#0d0d10;
  border:none;border-radius:12px;padding:14px;
  font-size:16px;font-weight:700;cursor:pointer;
  transition:transform .1s,opacity .1s;
}
.btn-next-ex:active{transform:scale(.97);opacity:.85;}
.btn-save-day{
  background:var(--blue);color:#0d0d10;
  border:none;border-radius:12px;padding:14px 18px;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.btn-prev-ex svg,.btn-save-day svg{display:block;}

/* ── HISTORY PAGE ── */
.history-page{
  position:absolute;inset:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 14px calc(var(--sb) + 20px);
  display:flex;flex-direction:column;gap:16px;
  background:var(--bg);
}
.hist-section-title{
  font-size:13px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:4px;
}
.hist-table{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.hist-table::-webkit-scrollbar{display:none;}
.hist-row{
  display:grid;
  grid-template-columns:130px repeat(var(--wk,1), 130px);
  gap:0;
  border-bottom:1px solid var(--border);
  min-width:min-content;
}
.hist-row:last-child{border-bottom:none;}
.hist-cell{
  padding:10px 12px;
  font-size:13px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;justify-content:center;
}
.hist-cell:last-child{border-right:none;}
.hist-head .hist-cell{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;
  background:var(--surface);
}
.hist-ex-name{font-weight:600;color:var(--text);font-size:13px;}
.hist-val{color:var(--muted);text-align:center;line-height:1.55;align-items:center;}
.hist-val.has-data{color:var(--text);font-weight:600;}
.hist-val div{white-space:nowrap;}
.hist-week-head{display:flex;flex-direction:column;gap:4px;align-items:center;}
.hist-week-lbl{font-size:11px;font-weight:700;color:var(--muted);}
.hist-date-input{
  width:100%;max-width:104px;
  background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:3px 4px;
  font-size:10px;color:var(--text);
  text-transform:none;letter-spacing:0;
  font-family:inherit;outline:none;
  -webkit-appearance:none;appearance:none;
}
.hist-date-input::-webkit-date-and-time-value{text-align:center;}

/* KOMMENT jelölés + tooltip */
.hist-val{position:relative;}
.has-note{position:relative;cursor:pointer;}
.note-marker{
  position:absolute;top:5px;right:5px;
  width:7px;height:7px;border-radius:50%;
  background:var(--blue);
}
.has-note::after{
  content:'';position:absolute;inset:0;
  border:1px dashed rgba(85,170,255,.4);
  border-radius:4px;pointer-events:none;
}
.note-tip{
  position:fixed;z-index:400;
  background:#fff;color:#111;
  font-size:13px;line-height:1.45;font-weight:500;
  padding:10px 13px;border-radius:10px;
  box-shadow:0 8px 30px rgba(0,0,0,.45);
  opacity:0;pointer-events:none;
  transition:opacity .15s;
  white-space:pre-wrap;
}
.note-tip.show{opacity:1;}
.note-tip::after{
  content:'';position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);
  border-left:7px solid transparent;border-right:7px solid transparent;
  border-top:7px solid #fff;
}

/* ── TESTSÚLY STATISZTIKA ── */
.bw-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
}
.bw-empty{padding:18px;font-size:13px;color:var(--muted);text-align:center;line-height:1.5;}
.bw-chart{display:block;width:100%;height:auto;padding:10px 8px 4px;}
.bw-grid{stroke:var(--border);stroke-width:1;}
.bw-axis{fill:var(--muted);font-size:9px;font-family:inherit;}
.bw-line{fill:none;stroke:var(--accent);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.bw-dot{fill:var(--accent);}
.bw-list{border-top:1px solid var(--border);}
.bw-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-bottom:1px solid var(--border);
}
.bw-row:last-child{border-bottom:none;}
.bw-row-date{font-size:13px;color:var(--muted);}
.bw-row-weight{display:flex;align-items:center;gap:8px;}
.bw-w{font-size:15px;font-weight:700;color:var(--text);}
.bw-delta{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;}
.bw-delta.up{color:#ff8a8a;background:rgba(255,90,90,.12);}
.bw-delta.down{color:var(--accent);background:var(--accent-dim);}

/* ── WEEK MODAL ── */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal-box{
  background:var(--surface);border-radius:20px 20px 0 0;
  padding:20px 18px calc(var(--sb) + 20px);
  width:100%;max-width:520px;
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.32,1,.72,1);
}
.modal-ov.open .modal-box{transform:translateY(0);}
.modal-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:14px;}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-height:260px;overflow-y:auto;}
.wk-btn{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:10px;padding:10px 4px;
  color:var(--text);font-size:14px;font-weight:600;
  text-align:center;cursor:pointer;transition:all .15s;
}
.wk-btn.active{background:var(--accent);border-color:var(--accent);color:#0d0d10;}
.modal-close{
  margin-top:14px;width:100%;
  background:var(--card);border:none;border-radius:12px;
  color:var(--muted);font-size:16px;font-weight:600;padding:13px;cursor:pointer;
}

/* ── TOAST ── */
.toast{
  position:fixed;top:calc(var(--st) + 68px);left:50%;
  transform:translateX(-50%) translateY(-12px);
  background:var(--accent);color:#0d0d10;
  font-size:14px;font-weight:700;
  padding:9px 20px;border-radius:30px;
  z-index:300;opacity:0;
  transition:all .22s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Page visibility */
.workout-page{display:block;}
.history-page{display:none;}
body.show-history .workout-page{display:none;}
body.show-history .history-page{display:flex;}
</style>
</head>
<body>

<!-- TOP (sticky minimal) -->
<div class="topbar">
  <div class="week-pill" id="weekPill">1. hét</div>
  <div class="topbar-title" id="topTitle" onclick="toggleDayMenu()">Felső 1 <svg class="chev" id="chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
  <div class="hdr-right">
    <div class="icon-btn" id="btnEdit" onclick="toggleEdit()" aria-label="Szerkesztés">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </div>
    <div class="icon-btn" id="btnHistory" onclick="togglePage()" aria-label="Statisztika">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="7"/><line x1="18" y1="20" x2="18" y2="11"/></svg>
    </div>
    <div class="icon-btn" id="btnMenu" onclick="toggleMainMenu(event)" aria-label="Menü">

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
const DAYS = [
  { name:'Felső 1', exercises:[
    {name:'Tricepsz fej fölött kötéllel', sets:2},
    {name:'Húzódzkodás', sets:2},
    {name:'15 fok KS Mell', sets:2},
    {name:'KS Bicepsz', sets:2},
    {name:'Felső Evezés', sets:2},
  ]},
  { name:'Alsó 1', exercises:[
    {name:'Comb Hajtás', sets:2},
    {name:'Lábtolás', sets:2},
    {name:'Csípő Nyitás', sets:2},
    {name:'BootyBuilder', sets:2},
    {name:'Vádli', sets:2},
  ]},
  { name:'Felső 2', exercises:[
    {name:'Tricepsz Letolás', sets:2},
    {name:'Széles Evezés', sets:2},
    {name:'Tárogatás', sets:2},
    {name:'KS Kalapács', sets:2},
    {name:'Válból Nyomás', sets:2},
  ]},
  { name:'Alsó 2', exercises:[
    {name:'Csípőtolás', sets:2},
    {name:'Comb nyújtás', sets:2},
    {name:'Csípő Zárás', sets:2},
    {name:'Szán tolás', sets:2},
    {name:'Comb Nyomás', sets:2},
  ]},
];

// ── NÉV FELÜLÍRÁSOK (szerkeszthető nevek) ──
// Az eredeti neveket kulcsként használjuk a BASE_HISTORY-hoz, a megjelenített név felülírható.
let editMode = false;

function dayNameKey(di){ return `dayname_${di}`; }
function exNameKey(di,ei){ return `exname_${di}_${ei}`; }

function getDayName(di){
  return localStorage.getItem(dayNameKey(di)) || DAYS[di].name;
}
function getDaySub(di){
  const subs = ['Mell/Hát','Combok','Váll/Kar','Csípő'];
  return localStorage.getItem(`daysub_${di}`) || subs[di] || '';
}
function getExName(di,ei){
  return localStorage.getItem(exNameKey(di,ei)) || DAYS[di].exercises[ei].name;
}
function setDayName(di,v){ v.trim() ? localStorage.setItem(dayNameKey(di),v.trim()) : localStorage.removeItem(dayNameKey(di)); }
function setDaySub(di,v){ v.trim() ? localStorage.setItem(`daysub_${di}`,v.trim()) : localStorage.removeItem(`daysub_${di}`); }
function setExName(di,ei,v){ v.trim() ? localStorage.setItem(exNameKey(di,ei),v.trim()) : localStorage.removeItem(exNameKey(di,ei)); }

const BASE_HISTORY = {
  'Tricepsz fej fölött kötéllel':[[65,10],[65,7]],
  'Húzódzkodás':[[95,8],[95,7]],
  '15 fok KS Mell':[[30,7],[30,6]],
  'KS Bicepsz':[[20,8],[20,8]],
  'Felső Evezés':[[60,10],[60,8]],
  'Comb Hajtás':[[65,8],[65,8]],
  'Lábtolás':[[240,7],[240,7]],
  'Csípő Nyitás':[[75,6],[75,6]],
  'BootyBuilder':[[80,7],[80,7]],
  'Vádli':[[120,6],[120,6]],
  'Tricepsz Letolás':[[65,9],[65,6]],
  'Széles Evezés':[[75,12],[80,11]],
  'Tárogatás':[[95,6],[100,6]],
  'KS Kalapács':[[20,7],[20,8]],
  'Válból Nyomás':[[50,6],[50,6]],
  'Csípőtolás':[[160,10],[160,10]],
  'Comb nyújtás':[[134,10],[134,10]],
  'Csípő Zárás':[[92,10],[92,10]],
  'Szán tolás':[[154,25],[154,25]],
  'Comb Nyomás':[[125,10],[125,10]],
};

const MAX_WEEKS = 20;
let currentDay = 0;
let currentEx = 0;
let currentWeek = parseInt(localStorage.getItem('currentWeek') || '1');
let currentPage = 'workout';

// In-memory working values (flushed to localStorage on save)
// key: `${day}_${exIdx}_${setIdx}_${field}` => number|null
let workingVals = {};

function wKey(d,e,s,f){ return `${d}_${e}_${s}_${f}`; }
function lsKey(w,d,e,s,f){ return `w${w}_d${d}_e${e}_s${s}_${f}`; }

function getWorking(d,e,s,f){
  const k = wKey(d,e,s,f);
  return (k in workingVals) ? workingVals[k] : null;
}
function setWorking(d,e,s,f,val){
  workingVals[wKey(d,e,s,f)] = val;
}

function getStored(w,d,e,s,f){
  const v = localStorage.getItem(lsKey(w,d,e,s,f));
  return v !== null ? parseFloat(v) : null;
}
function setStored(w,d,e,s,f,val){
  localStorage.setItem(lsKey(w,d,e,s,f), val);
}

// ── KOMMENT hét+nap+gyakorlathoz ──
function noteKey(w,d,e){ return `note_w${w}_d${d}_e${e}`; }
function getNote(w,d,e){ return localStorage.getItem(noteKey(w,d,e)) || ''; }
function setNote(w,d,e,txt){
  txt && txt.trim() ? localStorage.setItem(noteKey(w,d,e), txt) : localStorage.removeItem(noteKey(w,d,e));
}

// ── DÁTUM hét+naphoz ──
function dateKey(w,d){ return `date_w${w}_d${d}`; }
function getWorkoutDate(w,d){ return localStorage.getItem(dateKey(w,d)); } // YYYY-MM-DD vagy null
function setWorkoutDate(w,d,iso){
  iso ? localStorage.setItem(dateKey(w,d),iso) : localStorage.removeItem(dateKey(w,d));
}
function todayISO(){
  const t = new Date();
  const off = t.getTimezoneOffset();
  return new Date(t.getTime() - off*60000).toISOString().slice(0,10);
}
function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${y}.${m}.${d}.`;
}

// ── TESTSÚLY hét+naphoz ──
function bwKey(w,d){ return `bw_w${w}_d${d}`; }
function getBodyweight(w,d){
  const v = localStorage.getItem(bwKey(w,d));
  return v !== null ? parseFloat(v) : null;
}
function setBodyweight(w,d,val){
  (val !== null && val !== '' && !isNaN(val)) ? localStorage.setItem(bwKey(w,d),val) : localStorage.removeItem(bwKey(w,d));
}
// Minden rögzített testsúly időrendben: [{iso, date, weight}]
function allBodyweights(){
  const out = [];
  for(let w=1;w<=MAX_WEEKS;w++){
    for(let d=0;d<DAYS.length;d++){
      const bw = getBodyweight(w,d);
      if(bw !== null){
        const iso = getWorkoutDate(w,d) || '';
        out.push({iso, weight:bw, w, d});
      }
    }
  }
  // dátum szerint növekvő; dátum nélküliek a végére
  out.sort((a,b)=>{
    if(!a.iso && !b.iso) return 0;
    if(!a.iso) return 1;
    if(!b.iso) return -1;
    return a.iso < b.iso ? -1 : a.iso > b.iso ? 1 : 0;
  });
  return out;
}

function getPrev(d,e,s,f){
  // A legutóbbi hét, ahol ehhez a sorozathoz (s) volt bejegyzés — kg megléte alapján,
  // hogy a súly és az ismétlés ugyanabból az edzésből származzon.
  for(let w=currentWeek-1; w>=1; w--){
    if(getStored(w,d,e,s,'kg') !== null || getStored(w,d,e,s,'reps') !== null){
      return getStored(w,d,e,s,f);
    }
  }
  // Ha egyik héten sincs, a kiindulási előzményből (BASE_HISTORY), megtartva az 1./2. sorozatot
  const ex = DAYS[d].exercises[e];
  const base = BASE_HISTORY[ex.name];
  if(!base || !base[s]) return null;
  return f==='kg' ? base[s][0] : base[s][1];
}

// Resolve current value: working > stored (this week) > null
function getCurrent(d,e,s,f){
  const w = getWorking(d,e,s,f);
  if(w !== null) return w;
  return getStored(currentWeek,d,e,s,f);
}

// Load stored values for current day into working
function loadDayIntoWorking(){
  workingVals = {};
  const day = DAYS[currentDay];
  day.exercises.forEach((ex,ei)=>{
    for(let s=0;s<ex.sets;s++){
      ['kg','reps'].forEach(f=>{
        const stored = getStored(currentWeek,currentDay,ei,s,f);
        if(stored !== null) workingVals[wKey(currentDay,ei,s,f)] = stored;
      });
    }
  });
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
function render(){
  document.getElementById('weekPill').textContent = `${currentWeek}. hét`;
  // cím szövege a chevron megtartásával
  const tt = document.getElementById('topTitle');
  tt.firstChild ? tt.firstChild.textContent = getDayName(currentDay)+' '
                : tt.insertBefore(document.createTextNode(getDayName(currentDay)+' '), tt.firstChild);
  // napgombok feliratai
  document.querySelectorAll('#dayBar .day-btn').forEach((b,i)=>{
    b.classList.toggle('active',i===currentDay);
    const dl = b.querySelector('.dl');
    const ds = b.querySelector('.ds');
    if(dl) dl.textContent = getDayName(i);
    if(ds) ds.textContent = getDaySub(i);
  });
  renderExNav();
  renderSlides();
  updateProgress();
  updateNavBtns();
}

function renderExNav(){
  const nav = document.getElementById('exNav');
  nav.innerHTML = '';

  // Testsúly fül (currentEx === -1)
  const bwPill = document.createElement('div');
  bwPill.className = 'ex-pill bw-pill' + (currentEx === -1 ? ' active' : '');
  if(getBodyweight(currentWeek,currentDay) !== null) bwPill.classList.add('done-pill');
  bwPill.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="M21 21l-1-1"/><path d="M3 3l1 1"/><path d="M18 22l4-4"/><path d="M2 6l4-4"/><path d="M3 10l7-7"/><path d="M14 21l7-7"/></svg><span>Testsúly</span>';
  bwPill.onclick = ()=>{ currentEx=-1; renderSlides(); renderExNav(); updateNavBtns(); };
  nav.appendChild(bwPill);

  DAYS[currentDay].exercises.forEach((ex,i)=>{
    const pill = document.createElement('div');
    pill.className = 'ex-pill';
    if(i === currentEx) pill.classList.add('active');
    if(isExDone(i)) pill.classList.add('done-pill');

    const dot = document.createElement('span');
    dot.className = 'pill-dot';
    const lbl = document.createElement('span');
    lbl.textContent = (i+1)+'. '+getExName(currentDay,i).split(' ')[0];
    pill.appendChild(dot);
    pill.appendChild(lbl);
    pill.onclick = ()=>{ currentEx=i; renderSlides(); renderExNav(); updateNavBtns(); };
    nav.appendChild(pill);
  });
  // scroll active pill into view
  setTimeout(()=>{
    const active = nav.querySelector('.ex-pill.active');
    if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
}

function isExDone(ei){
  const ex = DAYS[currentDay].exercises[ei];
  for(let s=0;s<ex.sets;s++){
    for(const f of ['kg','reps']){
      if(getCurrent(currentDay,ei,s,f) === null) return false;
    }
  }
  return true;
}

function renderSlides(){
  const track = document.getElementById('swipeTrack');
  track.innerHTML = '';
  const slide = document.createElement('div');
  slide.className = 'ex-slide';
  if(currentEx === -1){
    // Testsúly fül
    slide.appendChild(buildBodyweightCard());
  } else {
    slide.appendChild(buildFocusCard(currentEx));
  }
  track.appendChild(slide);
  const wp = document.getElementById('workoutPage');
  if(wp) wp.scrollTop = wp.scrollTop;
}

function buildBodyweightCard(){
  const card = document.createElement('div');
  card.className = 'bw-card-full';

  const label = document.createElement('div');
  label.className = 'bw-full-label';
  label.textContent = 'Mai testsúly';

  const inputWrap = document.createElement('div');
  inputWrap.className = 'bw-input-wrap bw-input-wrap-lg';
  const input = document.createElement('input');
  input.type = 'number';
  input.inputMode = 'decimal';
  input.className = 'bw-input bw-input-lg';
  input.placeholder = '—';
  const cur = getBodyweight(currentWeek,currentDay);
  if(cur !== null) input.value = cur;
  input.oninput = ()=>{ setBodyweight(currentWeek,currentDay, input.value); renderExNav(); };
  const unit = document.createElement('span');
  unit.className = 'bw-unit';
  unit.textContent = 'kg';
  inputWrap.appendChild(input);
  inputWrap.appendChild(unit);

  const hint = document.createElement('div');
  hint.className = 'bw-hint';
  const dd = getWorkoutDate(currentWeek,currentDay);
  hint.textContent = dd ? `Edzés dátuma: ${fmtDate(dd)}` : 'A dátum mentéskor rögzül.';

  card.appendChild(label);
  card.appendChild(inputWrap);
  card.appendChild(hint);
  return card;
}

function buildFocusCard(ei){
  const ex = DAYS[currentDay].exercises[ei];
  const card = document.createElement('div');
  card.className = 'focus-card' + (ei===currentEx ? ' is-active-ex' : '');
  card.id = `fcard_${ei}`;

  // title row
  const top = document.createElement('div');
  top.className = 'fc-top';
  if(editMode){
    const nmInput = document.createElement('input');
    nmInput.className = 'fc-name-input';
    nmInput.value = getExName(currentDay,ei);
    nmInput.placeholder = 'Gyakorlat neve';
    nmInput.onchange = ()=>{ setExName(currentDay,ei,nmInput.value); renderExNav(); };
    top.appendChild(nmInput);
  } else {
    const nm = document.createElement('div');
    nm.className = 'fc-name';
    nm.textContent = getExName(currentDay,ei);
    top.appendChild(nm);
  }
  card.appendChild(top);

  // sets
  const list = document.createElement('div');
  list.className = 'sets-list';

  for(let s=0;s<ex.sets;s++){
    const row = document.createElement('div');
    row.className = 'set-row';

    const num = document.createElement('div');
    num.className = 'set-num';
    num.textContent = s+1;
    row.appendChild(num);

    ['kg','reps'].forEach(f=>{
      row.appendChild(buildDragCtrl(ei, s, f));
    });
    list.appendChild(row);

    // prev row
    const prev = document.createElement('div');
    prev.className = 'prev-row';
    ['kg','reps'].forEach(f=>{
      const chip = document.createElement('div');
      chip.className = 'prev-chip';
      const pl = document.createElement('div');
      pl.className = 'prev-label';
      pl.textContent = 'előző';
      const pv = document.createElement('div');
      pv.className = 'prev-val';
      const pVal = getPrev(currentDay,ei,s,f);
      pv.textContent = pVal !== null ? pVal + (f==='kg'?' kg':' ism') : '—';
      chip.appendChild(pl);
      chip.appendChild(pv);
      prev.appendChild(chip);
    });
    list.appendChild(prev);
  }

  card.appendChild(list);

  // komment mező (nem szerkesztő módban)
  if(!editMode){
    const noteWrap = document.createElement('div');
    noteWrap.className = 'note-wrap';
    const noteTa = document.createElement('textarea');
    noteTa.className = 'note-input';
    noteTa.placeholder = 'Megjegyzés ehhez a gyakorlathoz…';
    noteTa.rows = 2;
    noteTa.value = getNote(currentWeek,currentDay,ei);
    noteTa.oninput = ()=>{ setNote(currentWeek,currentDay,ei, noteTa.value); };
    noteWrap.appendChild(noteTa);
    card.appendChild(noteWrap);
  }

  return card;
}

function buildDragCtrl(ei, s, f){
  const wrap = document.createElement('div');
  wrap.className = 'drag-ctrl';
  wrap.id = `dc_${ei}_${s}_${f}`;

  const curVal = getCurrent(currentDay,ei,s,f);
  const prevVal = getPrev(currentDay,ei,s,f);

  const valEl = document.createElement('div');
  valEl.className = 'dc-val' + (curVal === null ? ' is-prev' : '');
  valEl.id = `dcv_${ei}_${s}_${f}`;
  valEl.textContent = curVal !== null ? curVal : (prevVal !== null ? prevVal : '—');

  const unitEl = document.createElement('div');
  unitEl.className = 'dc-unit';
  unitEl.textContent = f==='kg' ? 'kg' : 'ism';

  const arrows = document.createElement('div');
  arrows.className = 'dc-arrows';
  arrows.innerHTML = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

  // Hidden input for keyboard entry
  const inpWrap = document.createElement('div');
  inpWrap.className = 'dc-input-wrap';
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.inputMode = f==='kg' ? 'decimal' : 'numeric';
  inp.autocomplete = 'off';
  inpWrap.appendChild(inp);

  inp.addEventListener('input', ()=>{
    const v = parseFloat(inp.value);
    if(!isNaN(v)) applyVal(ei,s,f,v,true);
  });
  inp.addEventListener('blur', ()=>{
    inp.value='';
    inpWrap.classList.remove('editing');
    updateProgress(); renderExNav(); updateNavBtns();
  });

  wrap.appendChild(valEl);
  wrap.appendChild(unitEl);
  wrap.appendChild(arrows);
  wrap.appendChild(inpWrap);

  if(curVal !== null) wrap.classList.add('filled');

  // ── DRAG LOGIC ──
  const step = f==='kg' ? 0.5 : 1;
  const DRAG_PX = 10;
  let dragActive = false;
  let dragStart = null;
  let dragBaseVal = null;

  function startDrag(clientY){
    const cv = getCurrent(currentDay,ei,s,f);
    const pv = getPrev(currentDay,ei,s,f);
    dragBaseVal = cv !== null ? cv : (pv !== null ? pv : 0);
    dragStart = clientY;
    dragActive = true;
    wrap.classList.add('dragging');
  }

  function moveDrag(clientY){
    if(!dragActive) return;
    const delta = dragStart - clientY;
    const steps = Math.round(delta / DRAG_PX);
    let newVal = dragBaseVal + steps * step;
    newVal = f==='kg' ? Math.round(newVal*2)/2 : Math.max(0,Math.round(newVal));
    if(newVal < 0) newVal = 0;
    applyVal(ei,s,f,newVal,true); // silent during drag
  }

  function endDrag(){
    dragActive = false;
    dragStart = null;
    dragBaseVal = null;
    wrap.classList.remove('dragging');
    // sync UI after drag
    updateProgress();
    renderExNav();
    updateNavBtns();
  }

  // Húzás = érték; koppintás (alig mozdul) = billentyűzet
  let tStartY = 0, tStartX = 0, totalMove = 0;

  wrap.addEventListener('touchstart', e=>{
    if(inpWrap.classList.contains('editing')) return;
    e.preventDefault();
    tStartY = e.touches[0].clientY;
    tStartX = e.touches[0].clientX;
    totalMove = 0;
    startDrag(tStartY);
  }, {passive:false});

  wrap.addEventListener('touchmove', e=>{
    if(!dragActive) return;
    e.preventDefault();
    const y = e.touches[0].clientY;
    const x = e.touches[0].clientX;
    totalMove += Math.abs(y - tStartY) + Math.abs(x - tStartX);
    moveDrag(y);
  }, {passive:false});

  wrap.addEventListener('touchend', e=>{
    const wasDragging = dragActive;
    endDrag();
    // Ha alig mozdult → koppintásnak vesszük, nyitjuk a billentyűzetet
    if(wasDragging && totalMove < 8){
      openKeyboard();
    }
  });
  wrap.addEventListener('touchcancel', ()=>endDrag());

  function openKeyboard(){
    inpWrap.classList.add('editing');
    const cur = getCurrent(currentDay,ei,s,f);
    inp.value = cur !== null ? cur : '';
    inp.focus();
    inp.select && inp.select();
  }

  // Egér (asztali teszt)
  let mouseMoved = 0;
  wrap.addEventListener('mousedown', e=>{
    if(inpWrap.classList.contains('editing')) return;
    e.preventDefault();
    mouseMoved = 0;
    startDrag(e.clientY);
    const mm = ev=>{ ev.preventDefault(); mouseMoved += Math.abs(ev.movementY); moveDrag(ev.clientY); };
    const mu = ()=>{
      const wasDragging = dragActive;
      endDrag();
      if(wasDragging && mouseMoved < 4) openKeyboard();
      window.removeEventListener('mousemove',mm);
      window.removeEventListener('mouseup',mu);
    };
    window.addEventListener('mousemove',mm);
    window.addEventListener('mouseup',mu);
  });

  return wrap;
}

function applyVal(ei,s,f,val,silent=false){
  setWorking(currentDay,ei,s,f,val);
  const valEl = document.getElementById(`dcv_${ei}_${s}_${f}`);
  const ctrl = document.getElementById(`dc_${ei}_${s}_${f}`);
  if(valEl){
    valEl.textContent = val;
    valEl.classList.remove('is-prev');
  }
  if(ctrl) ctrl.classList.add('filled');
  if(!silent){
    updateProgress();
    renderExNav();
    updateNavBtns();
  }
}

function goToSlide(idx, animate=true){
  // Csak az aktuális gyakorlatot rendereljük újra
  renderSlides();
}

function goEx(dir){
  const exes = DAYS[currentDay].exercises.length;
  const prev = currentEx;
  currentEx = Math.max(-1, Math.min(exes-1, currentEx+dir));
  if(currentEx !== prev){
    renderSlides();
    renderExNav();
    updateNavBtns();
    const wp = document.getElementById('workoutPage');
    if(wp) wp.scrollTo({top:0, behavior:'smooth'});
  }
}

function updateNavBtns(){
  const exes = DAYS[currentDay].exercises.length;
  document.getElementById('btnPrevEx').style.opacity = currentEx===-1 ? '.3' : '1';
  const nextBtn = document.getElementById('btnNextEx');
  const lbl = document.getElementById('nextLabel');
  if(currentEx === exes-1){
    lbl.textContent = 'Kész';
    nextBtn.style.background = 'var(--blue)';
  } else {
    lbl.textContent = 'Következő';
    nextBtn.style.background = 'var(--accent)';
  }
}

function updateProgress(){
  const day = DAYS[currentDay];
  let filled=0,total=0;
  day.exercises.forEach((ex,ei)=>{
    for(let s=0;s<ex.sets;s++){
      ['kg','reps'].forEach(f=>{
        total++;
        if(getCurrent(currentDay,ei,s,f) !== null) filled++;
      });
    }
  });
  const pct = total>0 ? (filled/total)*100 : 0;
  document.getElementById('progFill').style.width = pct+'%';
}

function saveDay(){
  const day = DAYS[currentDay];
  let savedAny = false;
  day.exercises.forEach((ex,ei)=>{
    for(let s=0;s<ex.sets;s++){
      ['kg','reps'].forEach(f=>{
        const v = getCurrent(currentDay,ei,s,f);
        if(v !== null){ setStored(currentWeek,currentDay,ei,s,f,v); savedAny = true; }
      });
    }
  });
  // dátum hozzárendelése: ha még nincs, a mai nap
  if(savedAny && !getWorkoutDate(currentWeek,currentDay)){
    setWorkoutDate(currentWeek,currentDay,todayISO());
  }
  const d = getWorkoutDate(currentWeek,currentDay);
  showToast(d ? `Mentve – ${fmtDate(d)}` : 'Mentve');
}

// ════════════════════════════════════════════
//  HISTORY PAGE
// ════════════════════════════════════════════
function buildBodyweightSection(){
  const wrap = document.createElement('div');

  const title = document.createElement('div');
  title.className = 'hist-section-title';
  title.textContent = 'Testsúly';
  wrap.appendChild(title);

  const data = allBodyweights().filter(x=>x.iso); // csak dátummal rendelkezők a diagramhoz

  const box = document.createElement('div');
  box.className = 'bw-box';

  if(data.length === 0){
    const empty = document.createElement('div');
    empty.className = 'bw-empty';
    empty.textContent = 'Még nincs rögzített testsúly. Az edzés tetején tudod megadni.';
    box.appendChild(empty);
    wrap.appendChild(box);
    return wrap;
  }

  // ── VONALDIAGRAM (SVG) ──
  if(data.length >= 2){
    box.appendChild(buildBwChart(data));
  }

  // ── IDŐRENDI LISTA ──
  const list = document.createElement('div');
  list.className = 'bw-list';
  // legfrissebb felül
  [...data].reverse().forEach((x,idx,arr)=>{
    const rowEl = document.createElement('div');
    rowEl.className = 'bw-row';
    const dEl = document.createElement('div');
    dEl.className = 'bw-row-date';
    dEl.textContent = fmtDate(x.iso);
    const wEl = document.createElement('div');
    wEl.className = 'bw-row-weight';
    // változás az előzőhöz képest (idő szerint korábbi)
    const prev = arr[idx+1];
    let delta = '';
    if(prev){
      const d = x.weight - prev.weight;
      if(d !== 0){
        delta = (d>0?'+':'') + (Math.round(d*10)/10) + ' kg';
      }
    }
    wEl.innerHTML = `<span class="bw-w">${x.weight} kg</span>` + (delta?`<span class="bw-delta ${x.weight>prev.weight?'up':'down'}">${delta}</span>`:'');
    rowEl.appendChild(dEl);
    rowEl.appendChild(wEl);
    list.appendChild(rowEl);
  });
  box.appendChild(list);

  wrap.appendChild(box);
  return wrap;
}

function buildBwChart(data){
  const W = 320, H = 130, pad = {l:34,r:12,t:14,b:22};
  const weights = data.map(d=>d.weight);
  let min = Math.min(...weights), max = Math.max(...weights);
  if(min===max){ min-=1; max+=1; }
  const range = max-min;
  min -= range*0.15; max += range*0.15;
  const plotW = W-pad.l-pad.r, plotH = H-pad.t-pad.b;
  const x = i => pad.l + (data.length===1?plotW/2:(i/(data.length-1))*plotW);
  const y = v => pad.t + plotH - ((v-min)/(max-min))*plotH;

  const svgns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgns,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('class','bw-chart');

  // vízszintes segédvonalak + y címkék (min, közép, max)
  [min, (min+max)/2, max].forEach(v=>{
    const gy = y(v);
    const line = document.createElementNS(svgns,'line');
    line.setAttribute('x1',pad.l); line.setAttribute('x2',W-pad.r);
    line.setAttribute('y1',gy); line.setAttribute('y2',gy);
    line.setAttribute('class','bw-grid');
    svg.appendChild(line);
    const tx = document.createElementNS(svgns,'text');
    tx.setAttribute('x',pad.l-6); tx.setAttribute('y',gy+3);
    tx.setAttribute('class','bw-axis'); tx.setAttribute('text-anchor','end');
    tx.textContent = (Math.round(v*10)/10);
    svg.appendChild(tx);
  });

  // vonal
  const pts = data.map((d,i)=>`${x(i)},${y(d.weight)}`).join(' ');
  const poly = document.createElementNS(svgns,'polyline');
  poly.setAttribute('points',pts);
  poly.setAttribute('class','bw-line');
  svg.appendChild(poly);

  // pontok
  data.forEach((d,i)=>{
    const c = document.createElementNS(svgns,'circle');
    c.setAttribute('cx',x(i)); c.setAttribute('cy',y(d.weight)); c.setAttribute('r',3);
    c.setAttribute('class','bw-dot');
    svg.appendChild(c);
  });

  return svg;
}

function renderHistory(){
  const page = document.getElementById('historyPage');
  page.innerHTML = '';

  // ── TESTSÚLY szekció legfelül ──
  page.appendChild(buildBodyweightSection());

  DAYS.forEach((dayDef, di)=>{
    const section = document.createElement('div');

    const title = document.createElement('div');
    title.className = 'hist-section-title';
    title.textContent = getDayName(di);
    section.appendChild(title);

    // Find which weeks have any data for this day
    let weeksWithData = [];
    for(let w=1;w<=MAX_WEEKS;w++){
      let hasAny = false;
      dayDef.exercises.forEach((ex,ei)=>{
        for(let s=0;s<ex.sets;s++){
          if(getStored(w,di,ei,s,'kg') !== null){ hasAny=true; }
        }
      });
      if(hasAny) weeksWithData.push(w);
    }
    if(weeksWithData.length===0) weeksWithData = [currentWeek];

    // Show last 4 weeks + current
    const showWeeks = [...new Set([...weeksWithData.slice(-4), currentWeek])].sort((a,b)=>a-b);

    const tbl = document.createElement('div');
    tbl.className = 'hist-table';
    tbl.style.setProperty('--wk', showWeeks.length);

    // Header row
    const headRow = document.createElement('div');
    headRow.className = 'hist-row hist-head';

    const hEx = document.createElement('div');
    hEx.className = 'hist-cell';
    hEx.textContent = 'Gyakorlat';
    headRow.appendChild(hEx);
    showWeeks.forEach(w=>{
      const hw = document.createElement('div');
      hw.className = 'hist-cell hist-week-head';
      const wlbl = document.createElement('div');
      wlbl.className = 'hist-week-lbl';
      wlbl.textContent = `${w}. hét`;
      hw.appendChild(wlbl);
      // szerkeszthető dátum
      const dInput = document.createElement('input');
      dInput.type = 'date';
      dInput.className = 'hist-date-input';
      const cur = getWorkoutDate(w,di);
      if(cur) dInput.value = cur;
      dInput.onchange = ()=>{ setWorkoutDate(w,di,dInput.value); };
      hw.appendChild(dInput);
      headRow.appendChild(hw);
    });
    tbl.appendChild(headRow);

    // Exercise rows
    dayDef.exercises.forEach((ex,ei)=>{
      const row = document.createElement('div');
      row.className = 'hist-row';

      const nameCell = document.createElement('div');
      nameCell.className = 'hist-cell hist-ex-name';
      nameCell.textContent = getExName(di,ei);
      row.appendChild(nameCell);

      showWeeks.forEach(w=>{
        const cell = document.createElement('div');
        cell.className = 'hist-cell hist-val';
        let lines = [];
        for(let s=0;s<ex.sets;s++){
          const kg = w===1 && getStored(w,di,ei,s,'kg')===null
            ? (BASE_HISTORY[ex.name]?.[s]?.[0] ?? null)
            : getStored(w,di,ei,s,'kg');
          const rp = w===1 && getStored(w,di,ei,s,'reps')===null
            ? (BASE_HISTORY[ex.name]?.[s]?.[1] ?? null)
            : getStored(w,di,ei,s,'reps');
          if(kg !== null || rp !== null){
            lines.push(`${kg??'?'} kg × ${rp??'?'}`);
          }
        }
        if(lines.length){
          cell.innerHTML = lines.map(l=>`<div>${l}</div>`).join('');
          cell.classList.add('has-data');
          if(w===currentWeek) cell.style.color='var(--accent)';
        } else {
          cell.textContent = '—';
        }
        // komment jelölés + tap-and-hold tooltip
        const note = getNote(w,di,ei);
        if(note){
          cell.classList.add('has-note');
          const marker = document.createElement('span');
          marker.className = 'note-marker';
          cell.appendChild(marker);
          attachNotePress(cell, note);
        }
        row.appendChild(cell);
      });

      tbl.appendChild(row);
    });

    section.appendChild(tbl);
    page.appendChild(section);
  });
}

// ── KOMMENT tap-and-hold tooltip ──
function ensureNoteTip(){
  let tip = document.getElementById('noteTip');
  if(!tip){
    tip = document.createElement('div');
    tip.id = 'noteTip';
    tip.className = 'note-tip';
    document.body.appendChild(tip);
  }
  return tip;
}
function showNoteTip(text, x, y){
  const tip = ensureNoteTip();
  tip.textContent = text;
  tip.classList.add('show');
  // pozicionálás a koppintás fölé
  const tw = Math.min(260, window.innerWidth-24);
  tip.style.maxWidth = tw+'px';
  let left = x - tw/2;
  left = Math.max(12, Math.min(left, window.innerWidth - tw - 12));
  tip.style.left = left+'px';
  tip.style.top = (y - 12)+'px';
  tip.style.transform = 'translateY(-100%)';
}
function hideNoteTip(){
  const tip = document.getElementById('noteTip');
  if(tip) tip.classList.remove('show');
}
function attachNotePress(el, note){
  let timer = null;
  const start = (cx,cy)=>{
    timer = setTimeout(()=>{ showNoteTip(note, cx, cy); }, 280);
  };
  const cancel = ()=>{ if(timer){ clearTimeout(timer); timer=null; } hideNoteTip(); };

  el.addEventListener('touchstart', e=>{
    const t = e.touches[0];
    start(t.clientX, t.clientY);
  }, {passive:true});
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchcancel', cancel);
  el.addEventListener('touchmove', cancel, {passive:true});
  // egér (asztali)
  el.addEventListener('mousedown', e=> start(e.clientX, e.clientY));
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

const ICON_PENCIL = '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
const ICON_CHART = '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="7"/><line x1="18" y1="20" x2="18" y2="11"/></svg>';
const ICON_DUMBBELL = '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="M21 21l-1-1"/><path d="M3 3l1 1"/><path d="M18 22l4-4"/><path d="M2 6l4-4"/><path d="M3 10l7-7"/><path d="M14 21l7-7"/></svg>';

function toggleEdit(){
  editMode = !editMode;
  document.getElementById('btnEdit').classList.toggle('active', editMode);
  document.getElementById('btnEdit').innerHTML = editMode ? ICON_CHECK : ICON_PENCIL;
  if(editMode){
    // nyissuk ki a napmenüt, hogy a napneveket is lehessen szerkeszteni
    document.getElementById('dayMenu').classList.add('open');
    document.getElementById('topTitle').classList.add('open');
  } else {
    render(); // friss címek a kilépés után
  }
  renderDayBarEdit();
  renderSlides();
  showToast(editMode ? 'Szerkesztés – írd át a neveket' : 'Mentve');
}

function renderDayBarEdit(){
  document.querySelectorAll('#dayBar .day-btn').forEach((b,i)=>{
    b.onclick = editMode ? null : (()=>selectDay(i));
    const dl = b.querySelector('.dl');
    const ds = b.querySelector('.ds');
    if(editMode){
      // input mezőkké alakítjuk
      if(dl.tagName !== 'INPUT'){
        const inDl = document.createElement('input');
        inDl.className='dl dl-input'; inDl.value=getDayName(i);
        inDl.onchange=()=>{ setDayName(i,inDl.value); render(); };
        dl.replaceWith(inDl);
      }
      if(ds.tagName !== 'INPUT'){
        const inDs = document.createElement('input');
        inDs.className='ds ds-input'; inDs.value=getDaySub(i);
        inDs.onchange=()=>{ setDaySub(i,inDs.value); };
        ds.replaceWith(inDs);
      }
    } else {
      // vissza span-né
      if(dl.tagName === 'INPUT'){
        const sp=document.createElement('span'); sp.className='dl'; sp.textContent=getDayName(i); dl.replaceWith(sp);
      }
      if(ds.tagName === 'INPUT'){
        const sp=document.createElement('span'); sp.className='ds'; sp.textContent=getDaySub(i); ds.replaceWith(sp);
      }
    }
  });
}

// ════════════════════════════════════════════
function toggleMainMenu(e){
  if(e) e.stopPropagation();
  document.getElementById('mainMenu').classList.toggle('open');
}
function closeMainMenu(){
  document.getElementById('mainMenu').classList.remove('open');
}
// kattintás máshova → zárás
document.addEventListener('click', e=>{
  const menu = document.getElementById('mainMenu');
  const btn = document.getElementById('btnMenu');
  if(menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)){
    closeMainMenu();
  }
});

function exportData(){
  const data = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    data[k] = localStorage.getItem(k);
  }
  const payload = {
    app: 'edzesnaplo',
    version: 1,
    exportedAt: new Date().toISOString(),
    data
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = todayISO();
  a.href = url;
  a.download = `edzesnaplo_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  closeMainMenu();
  showToast('Adatok exportálva');
}

function importData(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      const data = parsed && parsed.data ? parsed.data : parsed;
      if(typeof data !== 'object' || data === null) throw new Error('hibás formátum');
      if(!confirm('Visszatöltés: a jelenlegi adatok felülíródnak a fájlból. Folytatod?')){
        e.target.value = '';
        return;
      }
      // app-adatok cseréje
      localStorage.clear();
      Object.keys(data).forEach(k=>{ localStorage.setItem(k, data[k]); });
      // állapot frissítése
      currentWeek = parseInt(localStorage.getItem('currentWeek') || '1');
      currentDay = 0; currentEx = 0;
      editMode = false;
      document.getElementById('btnEdit').classList.remove('active');
      document.getElementById('btnEdit').innerHTML = ICON_PENCIL;
      loadDayIntoWorking();
      render();
      showPage('workout');
      closeMainMenu();
      showToast('Adatok visszatöltve');
    }catch(err){
      alert('Nem sikerült beolvasni a fájlt. Biztosan a megfelelő mentést választottad?');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
