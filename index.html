<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Edzés">
<title>Edzés Napló</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TERV VÁLASZTÓ (legfelső szint) -->
<div class="plan-switch" id="planSwitch">
  <span class="plan-label">Terv:</span>
  <span class="plan-current" id="planName">Alap terv</span>
  <svg class="plan-chev" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
  <span class="sync-dot" id="syncDot" title="Szinkron állapot"></span>
</div>

<!-- TERV MENÜ (lenyíló) -->
<div class="plan-menu" id="planMenu"></div>

<!-- TOP (sticky minimal) -->
<div class="topbar">
  <div class="week-pill" id="weekPill">1. hét</div>
  <div class="topbar-title" id="topTitle">Felső 1 <svg class="chev" id="chev" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
  <div class="hdr-right">
    <div class="icon-btn" id="btnEdit" aria-label="Szerkesztés">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </div>
    <div class="icon-btn" id="btnHistory" aria-label="Statisztika">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="7"/><line x1="18" y1="20" x2="18" y2="11"/></svg>
    </div>
    <div class="icon-btn" id="btnMenu" aria-label="Menü">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </div>
  </div>
</div>

<!-- FŐMENÜ (profil + export/import) -->
<div class="main-menu" id="mainMenu">
  <button class="mm-item" data-action="profile">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profil</span>
  </button>
  <div class="mm-divider"></div>
  <button class="mm-item" data-action="export">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>Adatok mentése fájlba</span>
  </button>
  <button class="mm-item" data-action="import">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <span>Visszatöltés fájlból</span>
  </button>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none">
</div>

<!-- DAY DROPDOWN (rejtve, cím alatt nyílik) -->
<div class="day-menu" id="dayMenu">
  <div class="day-bar" id="dayBar"></div>
</div>

<!-- PROGRESS -->
<div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

<!-- PAGES -->
<div class="pages">

  <!-- WORKOUT PAGE -->
  <div class="workout-page" id="workoutPage">
    <div class="ex-nav" id="exNav"></div>
    <div class="swipe-area" id="swipeArea">
      <div class="swipe-track" id="swipeTrack"></div>
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="history-page" id="historyPage"></div>

</div>

<!-- BOTTOM NAV (workout only) -->
<div class="ex-nav-btns" id="navBtns">
  <button class="btn-prev-ex" id="btnPrevEx" aria-label="Előző">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="btn-next-ex" id="btnNextEx"><span id="nextLabel">Következő</span></button>
  <button class="btn-save-day" id="btnSaveDay" aria-label="Mentés">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
  </button>
</div>

<!-- WEEK MODAL -->
<div class="modal-ov" id="weekModal">
  <div class="modal-box">
    <div class="modal-title">Hét kiválasztása</div>
    <div class="week-grid" id="weekGrid"></div>
    <button class="modal-close" id="weekModalClose">Bezárás</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
